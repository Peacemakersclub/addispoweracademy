<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Dev Fundamentals · Addis Power Academy</title>
    <meta name="description" content="Free HTML, CSS & JavaScript course for Ethiopian beginners.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg-primary: #0a0f1e;
            --bg-secondary: #0f172a;
            --bg-tertiary: #1e2a44;
            --text-primary: #e0e7ff;
            --text-secondary: #9cb4d4;
            --text-muted: #6b8cae;
            --border-color: #1e2a44;
            --card-bg: #0f172a;
            --code-bg: #030712;
            --success: #10b981;
            --warning: #f59e0b;
        }
        [data-theme="light"] {
            --primary: #2563eb;
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --card-bg: #ffffff;
            --code-bg: #1e293b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }
        .navbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .logo-icon {
            background: var(--primary);
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }
        .logo-text {
            font-weight: 800;
            font-size: 1.2rem;
        }
        .logo-text .power {
            background: linear-gradient(135deg, var(--primary), #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-text .academy {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.8rem;
            margin-left: 4px;
        }
        .nav-links { display: flex; gap: 1.5rem; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; }
        .nav-links a:hover { color: var(--primary); }
        .theme-toggle {
            background: var(--bg-tertiary);
            border: none;
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
        }
        .progress-wrapper {
            max-width: 1200px;
            margin: 1.5rem auto 0;
            padding: 0 1.5rem;
        }
        .progress-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .step {
            text-align: center;
            flex: 1;
            font-size: 0.7rem;
            color: var(--text-muted);
            cursor: pointer;
        }
        .step.active { color: var(--primary); font-weight: 700; }
        .step.completed { color: var(--success); }
        .progress-bar-container {
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }
        .progress-fill {
            height: 6px;
            background: var(--primary);
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s;
        }
        .course-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 1.5rem 2rem;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 1.5rem;
        }
        .curriculum-sidebar {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            height: fit-content;
            position: sticky;
            top: 85px;
        }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border-color);
        }
        .module-count {
            background: var(--primary);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .module-list { list-style: none; }
        .module-item {
            padding: 0.8rem 0.9rem;
            margin-bottom: 4px;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }
        .module-item:hover { background: var(--bg-tertiary); }
        .module-item.active-module {
            background: rgba(59, 130, 246, 0.15);
            color: var(--primary);
            border-left: 3px solid var(--primary);
        }
        .module-item.completed-module { color: var(--success); }
        .module-item .check-icon { margin-left: auto; opacity: 0; }
        .module-item.completed-module .check-icon { opacity: 1; }
        .back-link {
            display: block;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back-link:hover { color: var(--primary); }
        .lesson-panel {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid var(--border-color);
        }
        .lesson-header {
            margin-bottom: 1.8rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.2rem;
        }
        .lesson-badge {
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.7rem;
            background: rgba(59, 130, 246, 0.15);
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            display: inline-block;
        }
        .lesson-title { font-size: 2rem; font-weight: 800; margin: 0.5rem 0 0.25rem; }
        .explanation {
            background: rgba(59, 130, 246, 0.1);
            border-radius: 18px;
            padding: 1.3rem;
            margin: 1.5rem 0;
            border-left: 5px solid var(--primary);
        }
        .checklist {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 0.3rem 1rem;
        }
        .checklist li { padding: 4px 0; display: flex; align-items: center; gap: 8px; }
        .checklist i { color: var(--success); }
        .code-block {
            background: var(--code-bg);
            border-radius: 16px;
            margin: 1.5rem 0;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .code-header {
            display: flex;
            justify-content: space-between;
            padding: 0.7rem 1.2rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
        }
        .copy-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.2rem 0.8rem;
            border-radius: 16px;
            cursor: pointer;
        }
        .code-block pre {
            padding: 1.2rem;
            margin: 0;
            font-family: monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .simulator-box {
            background: var(--bg-primary);
            border-radius: 18px;
            padding: 1.5rem;
            margin: 1.8rem 0;
            border: 1px solid var(--border-color);
        }
        .simulator-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        .run-sim-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }
        .live-preview {
            background: white;
            border-radius: 12px;
            padding: 1.2rem;
            margin-top: 1rem;
            color: #0f172a;
        }
        .sim-output {
            background: var(--code-bg);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
            font-family: monospace;
            color: var(--primary);
        }
        .tip-box {
            background: rgba(245, 158, 11, 0.1);
            border-radius: 14px;
            padding: 1rem 1.2rem;
            margin: 1.5rem 0;
            border-left: 4px solid var(--warning);
            display: flex;
            gap: 10px;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }
        .nav-btn {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }
        .nav-btn:hover { background: var(--primary); color: white; }
        .academy-footer {
            margin-top: 2rem;
            padding: 2rem 1.5rem;
            text-align: center;
            border-top: 1px solid var(--border-color);
        }
        .footer-contact {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }
        .footer-contact a { color: var(--primary); text-decoration: none; }
        @media (max-width: 800px) {
            .course-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="https://addispower.pages.dev" class="logo">
        <div class="logo-icon">💎</div>
        <div class="logo-text">
            <span class="power">ADDIS POWER</span>
            <span class="academy">ACADEMY</span>
        </div>
    </a>
    <div class="nav-links">
        <a href="https://addispower.pages.dev">Home</a>
        <a href="https://peacemakersclub.github.io/addispoweracademy/">Supabase</a>
        <a href="#" style="color: var(--primary);">Web Dev</a>
    </div>
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
</nav>

<div class="progress-wrapper">
    <div class="progress-steps" id="progressSteps"></div>
    <div class="progress-bar-container"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="course-container">
    <div class="curriculum-sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-code"></i> Web Dev</h3>
            <span class="module-count" id="moduleCount">6</span>
        </div>
        <ul class="module-list" id="moduleList"></ul>
        <a href="https://peacemakersclub.github.io/addispoweracademy/" class="back-link">
            <i class="fas fa-arrow-left"></i> All Courses
        </a>
    </div>
    <div class="lesson-panel" id="lessonPanel"></div>
</div>

<footer class="academy-footer">
    <div style="font-size: 1.5rem;">💎</div>
    <p style="font-weight: 700;">ADDIS POWER WEB SOLUTION</p>
    <p style="color: var(--text-secondary);">Build without compromise.</p>
    <div class="footer-contact">
        <span><i class="fas fa-envelope"></i> <a href="mailto:addispower@proton.me">addispower@proton.me</a></span>
        <span><i class="fab fa-telegram"></i> <a href="https://t.me/powr_addis">@powr_addis</a></span>
        <span><i class="fas fa-globe"></i> <a href="https://addispower.pages.dev">addispower.pages.dev</a></span>
    </div>
    <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 1.5rem;">
        © 2026 Addis Power Academy · Free for Ethiopian developers
    </p>
</footer>

<script>
    (function(){
        const modules = [
            { title: 'HTML Foundations', desc: 'Structure with tags.', concepts: ['Doctype','Headings','Paragraphs','Links','Images'], code: '<h1>Hello</h1>\n<p>Welcome</p>\n<a href="#">Link</a>', tip: 'HTML is markup, not programming.', simulator: 'html' },
            { title: 'CSS Basics', desc: 'Colors, fonts, box model.', concepts: ['Selectors','Colors','Margin/Padding','Flexbox'], code: 'body { background: #f0f4f8; }\nh1 { color: blue; }', tip: 'Use classes for reusable styles.', simulator: 'css' },
            { title: 'CSS Layout', desc: 'Flexbox and Grid.', concepts: ['Flexbox','Grid','Position','Responsive'], code: '.flex { display: flex; }\n.grid { display: grid; }', tip: 'Flexbox for 1D, Grid for 2D.', simulator: 'css' },
            { title: 'JavaScript Basics', desc: 'Variables, functions.', concepts: ['let/const','Functions','Arrays','Objects'], code: 'let name = "Hiwot";\nfunction greet() { return "Selam"; }', tip: 'JavaScript ≠ Java.', simulator: 'js' },
            { title: 'DOM & Events', desc: 'Interact with pages.', concepts: ['querySelector','addEventListener','createElement'], code: 'document.querySelector("button").addEventListener("click", () => alert("Hi!"));', tip: 'Use addEventListener.', simulator: 'js' },
            { title: '🏆 Todo App', desc: 'Complete project.', concepts: ['localStorage','CRUD','Deploy'], code: '// Full Todo App with localStorage', tip: 'Deploy to GitHub Pages!', simulator: 'project' }
        ];
        
        let current = 0;
        let completed = new Set(JSON.parse(localStorage.getItem('webdev_done')||'[]'));
        let theme = localStorage.getItem('theme')||'dark';
        
        const panel = document.getElementById('lessonPanel');
        const list = document.getElementById('moduleList');
        const steps = document.getElementById('progressSteps');
        const fill = document.getElementById('progressFill');
        const toggle = document.getElementById('themeToggle');
        
        function setTheme() {
            document.documentElement.setAttribute('data-theme', theme);
            toggle.innerHTML = theme==='dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }
        toggle.addEventListener('click', ()=>{
            theme = theme==='dark'?'light':'dark';
            localStorage.setItem('theme', theme);
            setTheme();
        });
        
        function updateUI() {
            steps.innerHTML = '';
            modules.forEach((_,i)=>{
                const s = document.createElement('div');
                s.className = `step ${i===current?'active':''} ${completed.has(i)?'completed':''}`;
                s.textContent = i+1;
                s.onclick = ()=>{ current=i; render(); };
                steps.appendChild(s);
            });
            fill.style.width = (completed.size/modules.length)*100 + '%';
            
            list.innerHTML = '';
            modules.forEach((m,i)=>{
                const li = document.createElement('li');
                li.className = `module-item ${i===current?'active-module':''} ${completed.has(i)?'completed-module':''}`;
                li.innerHTML = `<i class="fas fa-${['code','paint-brush','object-group','js','mouse-pointer','trophy'][i]||'book'}"></i><span>${i+1}. ${m.title}</span><i class="fas fa-check-circle check-icon"></i>`;
                li.onclick = ()=>{ current=i; render(); };
                list.appendChild(li);
            });
            document.getElementById('moduleCount').textContent = modules.length;
            localStorage.setItem('webdev_done', JSON.stringify([...completed]));
        }
        
        function render() {
            const m = modules[current];
            const done = completed.has(current);
            let sim = '';
            if (m.simulator === 'html') sim = `<div class="simulator-box"><div class="simulator-header"><span><i class="fab fa-html5"></i> Live Preview</span><button class="run-sim-btn" onclick="document.getElementById('preview').innerHTML=document.getElementById('htmlIn').value">Run</button></div><textarea id="htmlIn" style="width:100%;height:100px;background:var(--code-bg);color:var(--text-primary);padding:0.5rem;"><h1>Hello</h1><p>Edit me</p></textarea><div class="live-preview" id="preview"><h1>Hello</h1><p>Edit me</p></div></div>`;
            else if (m.simulator === 'css') sim = `<div class="simulator-box"><div class="simulator-header"><span><i class="fab fa-css3-alt"></i> CSS Playground</span></div><input type="color" id="bg" value="#3b82f6" onchange="document.getElementById('box').style.background=this.value"><div id="box" style="background:#3b82f6; padding:30px; border-radius:12px; margin-top:10px; color:white; text-align:center;">Style Me</div></div>`;
            else if (m.simulator === 'js') sim = `<div class="simulator-box"><div class="simulator-header"><span><i class="fab fa-js"></i> Console</span><button class="run-sim-btn" onclick="try{ document.getElementById('jsOut').textContent = eval(document.getElementById('jsIn').value); }catch(e){ document.getElementById('jsOut').textContent = 'Error: '+e.message; }">Run</button></div><textarea id="jsIn" style="width:100%;height:60px;background:var(--code-bg);color:var(--text-primary);">'Hello ' + 'Addis'</textarea><div class="sim-output" id="jsOut">> Output</div></div>`;
            else sim = `<div class="simulator-box"><div class="simulator-header"><span>🎓 Final Project</span></div><div class="sim-output">Build the Todo App from the code example!</div></div>`;
            
            panel.innerHTML = `
                <div class="lesson-header">
                    <span class="lesson-badge">${current===5?'CAPSTONE':'CORE'}</span>
                    <h2 class="lesson-title">${m.title}</h2>
                    <p style="color:var(--text-secondary);">${m.desc}</p>
                </div>
                <div class="explanation">
                    <h4 style="color:var(--primary); margin-bottom:0.8rem;"><i class="fas fa-gem"></i> Learning Objectives</h4>
                    <ul class="checklist">${m.concepts.map(c=>`<li><i class="fas fa-check-circle"></i> ${c}</li>`).join('')}</ul>
                </div>
                <div class="code-block">
                    <div class="code-header"><span><i class="fas fa-code"></i> Example</span><button class="copy-btn" id="copyBtn">Copy</button></div>
                    <pre>${m.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
                </div>
                ${sim}
                <div class="tip-box"><i class="fas fa-lightbulb"></i><div><strong>Pro tip:</strong> ${m.tip}</div></div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn" ${current===0?'disabled':''}><i class="fas fa-arrow-left"></i> Prev</button>
                    <button class="nav-btn" id="completeBtn" style="background:${done?'var(--success)':'var(--primary)'}; color:white;">${done?'✓ Done':'Mark Complete'}</button>
                    <button class="nav-btn" id="nextBtn">${current===5?'Finish 🎓':'Next'} <i class="fas fa-arrow-right"></i></button>
                </div>
            `;
            
            document.getElementById('copyBtn')?.addEventListener('click', function(){
                navigator.clipboard?.writeText(m.code);
                this.textContent = 'Copied!';
                setTimeout(()=> this.textContent = 'Copy', 1000);
            });
            document.getElementById('prevBtn')?.addEventListener('click', ()=>{ if(current>0){ current--; render(); updateUI(); } });
            document.getElementById('nextBtn')?.addEventListener('click', ()=>{ if(current<5){ current++; render(); updateUI(); } else { if(completed.size===6) alert('🎉 Course Complete!'); } });
            document.getElementById('completeBtn')?.addEventListener('click', function(){
                completed.has(current) ? completed.delete(current) : completed.add(current);
                updateUI(); render();
            });
            updateUI();
        }
        
        setTheme();
        render();
    })();
</script>
</body>
</html>
