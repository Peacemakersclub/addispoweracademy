<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Dev · Addis Power</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --primary: #3b82f6; --bg: #0a0f1e; --text: #e0e7ff; --card: #0f172a; }
        [data-theme="light"] { --primary: #2563eb; --bg: #f8fafc; --text: #0f172a; --card: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 1rem; }
        .container { max-width: 900px; margin: 0 auto; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; margin-bottom: 2rem; border-bottom: 1px solid #333; }
        .logo { font-weight: 800; font-size: 1.3rem; color: var(--primary); text-decoration: none; }
        .course-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin: 2rem 0; }
        .module-card { background: var(--card); border-radius: 20px; padding: 1.5rem; border: 1px solid #333; cursor: pointer; transition: 0.2s; }
        .module-card:hover { border-color: var(--primary); }
        .module-card h3 { color: var(--primary); margin-bottom: 0.5rem; }
        .module-card .status { color: #10b981; margin-top: 1rem; }
        .simulator { background: #030712; border-radius: 16px; padding: 1.5rem; margin: 2rem 0; }
        .simulator textarea { width: 100%; height: 120px; background: #0f172a; color: #e0e7ff; border: 1px solid #333; border-radius: 10px; padding: 0.8rem; font-family: monospace; margin-bottom: 1rem; }
        .preview { background: white; color: black; padding: 1rem; border-radius: 10px; margin-top: 1rem; }
        .btn { background: var(--primary); color: white; border: none; padding: 0.5rem 1.5rem; border-radius: 30px; cursor: pointer; font-weight: 600; }
        .footer { margin-top: 3rem; padding: 1.5rem 0; text-align: center; border-top: 1px solid #333; color: #888; }
        .back-link { color: #888; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <nav class="navbar">
        <a href="https://addispower.pages.dev" class="logo">💎 ADDIS POWER</a>
        <a href="https://peacemakersclub.github.io/addispoweracademy/" class="back-link">← All Courses</a>
    </nav>

    <h1>🌐 Web Development Fundamentals</h1>
    <p>HTML, CSS, and JavaScript with live simulators.</p>

    <div class="course-grid" id="courseGrid"></div>

    <div id="lessonPanel" class="simulator"></div>

    <footer class="footer">
        <p>ADDIS POWER WEB SOLUTION · addispower@proton.me · @powr_addis</p>
    </footer>
</div>

<script>
    const modules = [
        { title: 'HTML', desc: 'Structure with tags', code: '<h1>Hello</h1>\n<p>Welcome</p>', sim: 'html' },
        { title: 'CSS', desc: 'Colors and layout', code: 'body { background: #f0f4f8; }\nh1 { color: blue; }', sim: 'css' },
        { title: 'JavaScript', desc: 'Interactivity', code: 'console.log("Hello Addis!");', sim: 'js' }
    ];

    let current = 0;
    const grid = document.getElementById('courseGrid');
    const panel = document.getElementById('lessonPanel');

    function renderGrid() {
        grid.innerHTML = modules.map((m, i) => `
            <div class="module-card" onclick="selectModule(${i})">
                <h3>${i+1}. ${m.title}</h3>
                <p>${m.desc}</p>
                ${localStorage.getItem('webdev_'+i) ? '<div class="status">✓ Completed</div>' : ''}
            </div>
        `).join('');
    }

    function selectModule(i) {
        current = i;
        const m = modules[i];
        let simHtml = '';
        if (m.sim === 'html') simHtml = `<textarea id="htmlIn">${m.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea><button class="btn" onclick="runHtml()">Run</button><div class="preview" id="preview"></div>`;
        else if (m.sim === 'css') simHtml = `<input type="color" id="bg" value="#3b82f6" onchange="document.getElementById('box').style.background=this.value"><div id="box" style="background:#3b82f6; padding:30px; border-radius:12px; margin-top:10px; color:white;">Style Me</div>`;
        else if (m.sim === 'js') simHtml = `<textarea id="jsIn">${m.code}</textarea><button class="btn" onclick="runJs()">Run</button><div id="jsOut" style="margin-top:1rem;">> Output</div>`;
        
        panel.innerHTML = `
            <h2>${m.title}</h2>
            <p>${m.desc}</p>
            <pre style="background:#030712; padding:1rem; border-radius:10px; margin:1rem 0;">${m.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
            ${simHtml}
            <div style="margin-top:1.5rem;">
                <button class="btn" onclick="markComplete(${i})">${localStorage.getItem('webdev_'+i) ? 'Completed ✓' : 'Mark Complete'}</button>
            </div>
        `;
    }

    window.runHtml = () => document.getElementById('preview').innerHTML = document.getElementById('htmlIn').value;
    window.runJs = () => { try { document.getElementById('jsOut').textContent = eval(document.getElementById('jsIn').value); } catch(e) { document.getElementById('jsOut').textContent = 'Error: ' + e.message; } };
    window.markComplete = (i) => { 
        localStorage.getItem('webdev_'+i) ? localStorage.removeItem('webdev_'+i) : localStorage.setItem('webdev_'+i, true);
        renderGrid(); selectModule(i);
    };

    renderGrid();
    selectModule(0);
</script>
</body>
</html>
